[config]
default_to_workspace = false

# ─── Core Build ────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build all workspace crates (debug)"
command = "cargo"
args = ["build", "--workspace"]

[tasks.build-release]
description = "Build all workspace crates (release)"
command = "cargo"
args = ["build", "--workspace", "--release"]

# ─── Testing ───────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all workspace tests (nextest)"
command = "cargo"
args = ["nextest", "run", "--workspace"]
install_crate = "cargo-nextest"

[tasks.test-cargo]
description = "Run all workspace tests (standard cargo test, for doc tests)"
command = "cargo"
args = ["test", "--workspace"]

# ─── Linting & Formatting ──────────────────────────────────────────────────────

[tasks.lint]
description = "Run clippy with pedantic warnings across all crates"
command = "cargo"
args = ["clippy", "--workspace", "--", "-W", "clippy::pedantic"]

[tasks.fmt]
description = "Check formatting across all crates"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt-fix]
description = "Apply formatting across all crates"
command = "cargo"
args = ["fmt", "--all"]

# ─── Coverage ──────────────────────────────────────────────────────────────────

[tasks.coverage]
description = "Generate LLVM coverage report (terminal summary)"
command = "cargo"
args = ["llvm-cov", "--workspace"]
install_crate = "cargo-llvm-cov"

[tasks.coverage-html]
description = "Generate LLVM coverage report (HTML, opens browser)"
script = [
    "cargo llvm-cov --workspace --html",
    "open target/llvm-cov/html/index.html"
]

[tasks.coverage-ci]
description = "Coverage check — fails if below 99% (used in CI)"
command = "cargo"
# Excluded files:
#   main.rs          — binary entry point with no testable logic.
#   render_window.rs — winit event-loop glue; ActiveEventLoop and Window
#     cannot be constructed outside the event loop, making the
#     ApplicationHandler callbacks untestable as unit tests.  All extractable
#     business logic is tested via AppState helper methods (see module doc).
#   wgpu_surface.rs  — WgpuRenderer::new() requires a live wgpu::Surface
#     backed by a real OS window (create_surface, adapter selection with
#     compatible_surface, swap-chain configure).  Covered under hw-render-tests
#     on hardware CI runners.  See the module doc for details.
#   test_helper.rs   — shared test doubles (NullDecoder trait stubs, loopback
#     helper).  Required trait methods (flush, codec) are never called by the
#     tests themselves; testing test helpers with more tests adds no value.
#   ffmpeg_enc.rs, ffmpeg_dec.rs — FFmpeg files are excluded because the
#     ffmpeg-fallback feature is not enabled in the default cargo make ci
#     pipeline.  These files are compiled and tested in the dedicated
#     ffmpeg-check CI job.
args = ["llvm-cov", "--workspace", "--fail-under-lines", "99", "--ignore-filename-regex", "main\\.rs|render_window\\.rs|wgpu_surface\\.rs|ffmpeg_enc\\.rs|ffmpeg_dec\\.rs"]

# ─── Benchmarks ────────────────────────────────────────────────────────────────

[tasks.benchmark]
description = "Run Criterion benchmarks across all crates"
command = "cargo"
args = ["bench", "--workspace"]

# ─── Instrumentation ───────────────────────────────────────────────────────────

[tasks.instruments]
description = "Profile a binary with cargo-instruments (macOS only). Usage: cargo make instruments --bin rayplay-cli -- --template time"
command = "cargo"
args = ["instruments", "--workspace"]
install_crate = "cargo-instruments"

[tasks.instruments-time]
description = "Time Profiler on rayplay-cli (macOS only)"
command = "cargo"
args = ["instruments", "-t", "Time Profiler", "--bin", "rayplay-cli"]

[tasks.instruments-alloc]
description = "Allocations Profiler on rayplay-cli (macOS only)"
command = "cargo"
args = ["instruments", "-t", "Allocations", "--bin", "rayplay-cli"]

# ─── Composite Gates ───────────────────────────────────────────────────────────

[tasks.lint-test-coverage]
description = "Run lint + tests + coverage in sequence (local quality gate)"
dependencies = ["lint", "test", "coverage-ci"]

[tasks.ci]
description = "Full CI pipeline: fmt + lint + test + coverage"
dependencies = ["fmt", "lint", "test", "coverage-ci"]

# ─── Utility ───────────────────────────────────────────────────────────────────

[tasks.clean]
description = "Clean all build artifacts"
command = "cargo"
args = ["clean"]

[tasks.doc]
description = "Build and open rustdoc for all crates"
script = [
    "cargo doc --workspace --no-deps --open"
]

[tasks.check]
description = "Fast type-check without producing binaries"
command = "cargo"
args = ["check", "--workspace"]
