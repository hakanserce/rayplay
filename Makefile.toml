[config]
default_to_workspace = false

# ─── Core Build ────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build all workspace crates (debug)"
command = "cargo"
args = ["build", "--workspace"]

[tasks.build-release]
description = "Build all workspace crates (release)"
command = "cargo"
args = ["build", "--workspace", "--release"]

# ─── Testing ───────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all workspace tests (nextest)"
command = "cargo"
args = ["nextest", "run", "--workspace"]
install_crate = "cargo-nextest"

[tasks.test-cargo]
description = "Run all workspace tests (standard cargo test, for doc tests)"
command = "cargo"
args = ["test", "--workspace"]

# ─── Linting & Formatting ──────────────────────────────────────────────────────

[tasks.lint]
description = "Run clippy with pedantic warnings across all crates"
command = "cargo"
args = ["clippy", "--workspace", "--", "-W", "clippy::pedantic"]

[tasks.fmt]
description = "Check formatting across all crates"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt-fix]
description = "Apply formatting across all crates"
command = "cargo"
args = ["fmt", "--all"]

# ─── Coverage ──────────────────────────────────────────────────────────────────

# Excluded files (platform/hardware glue — untestable on headless CI):
#   main.rs            — binary entry points with no testable logic
#     (also matches client_main.rs).
#   render_window.rs   — winit event-loop glue; ActiveEventLoop and Window
#     cannot be constructed outside the event loop.
#   wgpu_surface.rs    — requires a live wgpu::Surface backed by a real OS
#     window (create_surface, adapter selection, swap-chain configure).
#   wgpu_iosurface.rs  — IOSurface → Metal → wgpu texture import; macOS
#     Metal FFI that requires a live GPU context.
#   test_helper.rs     — shared test doubles; testing test helpers adds no value.
#   ffmpeg_enc.rs, ffmpeg_dec.rs — FFmpeg feature not enabled in default CI;
#     tested in the dedicated ffmpeg-check CI job.
#   scrap_capture.rs   — platform glue wrapping scrap::Capturer / Display.
#   capture_factory.rs — platform-dispatch factory with #[cfg] blocks.
#   transport_tls.rs   — TLS cert generation / rustls config; error paths are
#     virtually unreproducible (rcgen/rustls internal failures).
#   connect.rs         — macOS-only async QUIC connect with reconnect loop;
#     platform-gated (#[cfg(target_os = "macos")]) glue code.
#   receive.rs         — async receive-decode loop tightly coupled to connect.rs.

[tasks.coverage]
clear = true
description = "Coverage check — fails if line coverage drops below 99%"
command = "cargo"
args = ["llvm-cov", "--workspace", "--fail-under-lines", "99", "--ignore-filename-regex", "main\\.rs|render_window\\.rs|wgpu_surface\\.rs|wgpu_iosurface\\.rs|ffmpeg_enc\\.rs|ffmpeg_dec\\.rs|test_helper\\.rs|scrap_capture\\.rs|capture_factory\\.rs|transport_tls\\.rs|trust_store\\.rs|client_key_store\\.rs|host_pairing_glue\\.rs|connect\\.rs|receive\\.rs"]

[tasks.coverage-html]
description = "Generate LLVM coverage report (HTML, opens browser)"
script = [
    '''cargo llvm-cov --workspace --html --ignore-filename-regex "main\\.rs|render_window\\.rs|wgpu_surface\\.rs|wgpu_iosurface\\.rs|ffmpeg_enc\\.rs|ffmpeg_dec\\.rs|test_helper\\.rs|scrap_capture\\.rs|capture_factory\\.rs|transport_tls\\.rs|trust_store\\.rs|client_key_store\\.rs|host_pairing_glue\\.rs|connect\\.rs|receive\\.rs"''',
    "open target/llvm-cov/html/index.html"
]


# ─── Benchmarks ────────────────────────────────────────────────────────────────

[tasks.benchmark]
description = "Run Criterion benchmarks across all crates"
command = "cargo"
args = ["bench", "--workspace"]

# ─── Instrumentation ───────────────────────────────────────────────────────────

[tasks.instruments]
description = "Profile a binary with cargo-instruments (macOS only). Usage: cargo make instruments --bin rayplay-cli -- --template time"
command = "cargo"
args = ["instruments", "--workspace"]
install_crate = "cargo-instruments"

[tasks.instruments-time]
description = "Time Profiler on rayplay-cli (macOS only)"
command = "cargo"
args = ["instruments", "-t", "Time Profiler", "--bin", "rayplay-cli"]

[tasks.instruments-alloc]
description = "Allocations Profiler on rayplay-cli (macOS only)"
command = "cargo"
args = ["instruments", "-t", "Allocations", "--bin", "rayplay-cli"]

# ─── Composite Gates ───────────────────────────────────────────────────────────

[tasks.lint-test-coverage]
description = "Run lint + tests + coverage in sequence (local quality gate)"
dependencies = ["lint", "test", "coverage"]

[tasks.ci]
description = "Full CI pipeline: fmt + lint + test + coverage"
dependencies = ["fmt", "lint", "test", "coverage"]

# ─── Utility ───────────────────────────────────────────────────────────────────

[tasks.clean]
description = "Clean all build artifacts"
command = "cargo"
args = ["clean"]

[tasks.doc]
description = "Build and open rustdoc for all crates"
script = [
    "cargo doc --workspace --no-deps --open"
]

[tasks.check]
description = "Fast type-check without producing binaries"
command = "cargo"
args = ["check", "--workspace"]
